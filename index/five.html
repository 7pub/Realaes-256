<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto-OTP Secure Notes</title>
    <style>
        :root {
            --primary-color: #4285f4;
            --icon-size: 24px;
        }

        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html, body { 
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body { 
            background: #fafafa;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            font-size: 14px;
            font-weight: 400;
            line-height: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .app-title { 
            text-align: center; 
            color: var(--primary-color); 
            font-size: 24px;
            font-weight: 400;
            letter-spacing: -0.012em;
            line-height: 32px;
            margin: 24px 0 32px 0;
        }

        .card { 
            background-color: #ffffff;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.12), 0 1px 2px 0 rgba(0, 0, 0, 0.24);
            transition: box-shadow 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            box-shadow: 0 3px 6px 0 rgba(0, 0, 0, 0.16), 0 3px 6px 0 rgba(0, 0, 0, 0.23);
        }

        .card-title {
            color: #64748b;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.12em;
            margin-bottom: 16px;
            display: block;
            text-transform: uppercase;
        }

        textarea { 
            width: 100%;
            height: 100px;
            background-color: #f1f3f4;
            color: #333;
            border: none;
            border-radius: 4px;
            padding: 16px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
            line-height: 20px;
            resize: vertical;
            outline: none;
            transition: background-color 300ms;
        }

        textarea:focus {
            background-color: #e8eaed;
        }

        input { 
            background-color: #f1f3f4;
            color: #333;
            border: none;
            border-radius: 4px;
            padding: 16px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: background-color 300ms;
            box-sizing: border-box;
        }

        input:focus {
            background-color: #e8eaed;
        }

        button { 
            background: inherit;
            color: var(--primary-color);
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            min-height: 36px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            white-space: nowrap;
            user-select: none;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
            touch-action: manipulation;
            margin-top: 16px;
            width: 100%;
            transition: background-color 300ms;
        }

        button:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: currentColor;
            opacity: 0;
            border-radius: 4px;
            transition: opacity 300ms;
            z-index: -1;
        }

        button:hover:before {
            opacity: 0.1;
        }

        button:focus:before {
            opacity: 0.2;
        }

        .btn-dark { 
            color: #4a5568;
            margin-top: 8px;
        }

        .btn-danger { 
            color: #d9534f;
            margin-top: 8px;
        }

        .setting-row { 
            margin-top: 16px;
            color: #64748b;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setting-row input {
            width: 60px;
            padding: 8px;
            text-align: center;
        }

        .status-bar { 
            font-size: 12px;
            color: var(--primary-color);
            margin-top: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* QR-Code Container */
        .qr-container {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: #f1f3f4;
            display: none;
            border-radius: 8px;
        }

        .qr-container.show {
            display: block;
            animation: fadeIn 300ms ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .qr-container table {
            margin: 0 auto;
        }

        .qr-container > div:last-child {
            font-size: 11px;
            color: #64748b;
            margin-top: 12px;
            font-weight: 500;
        }

        .sticky-note { 
            background-color: #fff3cd;
            color: #664d03;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            display: none;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.12);
            animation: slideUp 300ms ease-out;
        }

        .sticky-note.show {
            display: block;
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sticky-note > span {
            color: #b70000;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .sticky-note p {
            margin: 12px 0 0 0;
            word-break: break-word;
            line-height: 1.6;
        }

        #countdown {
            color: #b70000;
            font-weight: 700;
            font-size: 13px;
            margin-top: 12px;
            letter-spacing: 0.04em;
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .app-title {
                font-size: 20px;
                margin: 16px 0 24px 0;
            }

            .card {
                padding: 16px;
            }
        }
    </style>

    <!-- Extrem abwärtskompatible, serverunabhängige Offline-QR-Bibliothek -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="app-title">Auto-OTP Secure Notes</div>
            
        <!-- Section 1: Master Key Setup & QR Code -->
        <div class="card">
            <span class="card-title">Master Token Seed</span>
            <input type="text" id="master-seed" value="GEHEIMER_P2P_SEED" onchange="updateLiveKey()">
            <div id="otp-status" class="status-bar">Computing time window...</div>
            
            <button class="btn-dark" onclick="toggleQR()">Display QR Code</button>
            <button class="btn-danger" onclick="resetMasterSeed()">🚨 Rotate Key</button>
            
            <div id="qrcode-box" class="qr-container">
                <div id="qrcode"></div>
                <div>Scan with second device to sync seed</div>
            </div>
        </div>

        <!-- Section 2: Send Message -->
        <div class="card">
            <span class="card-title">Send Message (Auto-Encrypted)</span>
            <textarea id="msg-input" placeholder="Enter message..." onkeyup="autoEncrypt()"></textarea>
            <div class="setting-row">
                <label for="ttl">Auto-destroy in:</label>
                <input type="text" id="ttl" value="30" onchange="autoEncrypt()">
                <span>seconds</span>
            </div>
        </div>

        <!-- Section 3: Receive Message -->
        <div class="card">
            <span class="card-title">Encrypted Payload (P2P)</span>
            <textarea id="crypto-io" placeholder="Paste encrypted code for auto-decryption..." onkeyup="autoDecrypt()" onchange="autoDecrypt()"></textarea>
        </div>

        <!-- Temporary Note Display -->
        <div id="sticky-note" class="sticky-note">
            <span>⚠️ Temporary View</span>
            <p id="note-text"></p>
            <div id="countdown"></div>
        </div>
    </div>

<script type="text/javascript">
// --- GLOBAL TIMER FOR DECRYPTION ---
var timerInterval = null;
var qrObj = null;

// --- OTP KEY GENERATOR ---
function getOTPKeyByWindow(seed, windowOffset) {
    var now = new Date().getTime();
    var timeWindow = Math.floor(now / 1000 / 30) + windowOffset; 
    var combined = seed + "_" + timeWindow;
    var hash = 0;
    for (var i = 0; i < combined.length; i++) {
        hash = ((hash << 5) - hash) + combined.charCodeAt(i);
        hash |= 0;
    }
    return "OTP_" + Math.abs(hash);
}

// Live ticker for the 30-second time window in the UI
function startLiveTimer() {
    setInterval(function() {
        var now = new Date();
        var secondsLeft = 30 - (now.getSeconds() % 30);
        var seed = document.getElementById('master-seed').value;
        var currentKey = getOTPKeyByWindow(seed, 0);
        document.getElementById('otp-status').innerText = "Active key: " + currentKey + " (changes in " + secondsLeft + "s)";
        
        if(document.getElementById('msg-input').value.length > 0) {
            autoEncrypt();
        }
    }, 1000);
}

// --- OFFLINE QR-CODE GENERATOR LOGIC ---
function drawQRCode(text) {
    document.getElementById('qrcode').innerHTML = "";
    qrObj = new QRCode(document.getElementById("qrcode"), {
        text: text,
        width: 128,
        height: 128,
        correctLevel : QRCode.CorrectLevel.M
    });
}

function toggleQR() {
    var box = document.getElementById('qrcode-box');
    var seed = document.getElementById('master-seed').value;
    
    if (box.classList.contains('show')) {
        box.classList.remove('show');
    } else {
        box.classList.add('show');
        drawQRCode(seed);
    }
}

// --- KEY ROTATION & PANIC RESET ---
function resetMasterSeed() {
    var check = confirm("Delete the current Master Seed and generate a new key? Your partner must scan the new QR code!");
    if (check) {
        // Generate random value (fully ES3 compatible)
        var randomPart = Math.floor(Math.random() * 9999999);
        var timePart = new Date().getTime();
        var combined = "SEED_" + timePart + "_" + randomPart;
        
        var hash = 0;
        for (var i = 0; i < combined.length; i++) {
            hash = ((hash << 5) - hash) + combined.charCodeAt(i);
            hash |= 0;
        }
        var newSeed = "SECURE_" + Math.abs(hash);
        
        // Reset UI and values
        document.getElementById('master-seed').value = newSeed;
        document.getElementById('msg-input').value = "";
        document.getElementById('crypto-io').value = "";
        document.getElementById('sticky-note').classList.remove('show');
        
        if(timerInterval) {
            clearInterval(timerInterval);
        }
        
        // Redraw QR if visible
        var box = document.getElementById('qrcode-box');
        if (box.classList.contains('show')) {
            drawQRCode(newSeed);
        }
        
        alert("Old key has been overwritten in RAM. New seed is active.");
    }
}

// --- XXTEA ENCRYPTION ENGINE (LIGHTWEIGHT AES REPLACEMENT) ---
var AESLight = {
    encrypt: function(str, key) {
        if (str.length == 0) return "";
        var v = this.str2long(str, true), k = this.str2long(key, false);
        if (k.length < 4) k.length = 4;
        var n = v.length - 1, z = v[n], y = v[0], delta = 0x9E3779B9, q = Math.floor(6 + 52 / (n + 1)), sum = 0;
        while (q-- > 0) {
            sum = (sum + delta) & 0xffffffff;
            var e = (sum >>> 2) & 3;
            for (var p = 0; p < n; p++) {
                y = v[p + 1];
                z = v[p] = (v[p] + (((z >>> 5 ^ y << 2) + (y >>> 3 ^ z << 4)) ^ ((sum ^ y) + (k[(p & 3) ^ e] ^ z)))) & 0xffffffff;
            }
            y = v[0];
            z = v[n] = (v[n] + (((z >>> 5 ^ y << 2) + (y >>> 3 ^ z << 4)) ^ ((sum ^ y) + (k[(n & 3) ^ e] ^ z)))) & 0xffffffff;
        }
        return this.long2str(v, false);
    },
    decrypt: function(str, key) {
        if (str.length == 0) return "";
        var v = this.str2long(str, false), k = this.str2long(key, false);
        if (k.length < 4) k.length = 4;
        var n = v.length - 1, z = v[n], y = v[0], delta = 0x9E3779B9, q = Math.floor(6 + 52 / (n + 1)), sum = (q * delta) & 0xffffffff;
        while (sum != 0) {
            var e = (sum >>> 2) & 3;
            for (var p = n; p > 0; p--) {
                z = v[p - 1];
                y = v[p] = (v[p] - (((z >>> 5 ^ y << 2) + (y >>> 3 ^ z << 4)) ^ ((sum ^ y) + (k[(p & 3) ^ e] ^ z)))) & 0xffffffff;
            }
            z = v[n];
            y = v[0] = (v[0] - (((z >>> 5 ^ y << 2) + (y >>> 3 ^ z << 4)) ^ ((sum ^ y) + (k[(0 & 3) ^ e] ^ z)))) & 0xffffffff;
            sum = (sum - delta) & 0xffffffff;
        }
        try { return this.long2str(v, true); } catch(e) { return ""; }
    },
    str2long: function(s, w) {
        var l = new Array(Math.ceil(s.length / 4));
        for (var i = 0; i < l.length; i++) {
            l[i] = s.charCodeAt(i * 4) | s.charCodeAt(i * 4 + 1) << 8 | s.charCodeAt(i * 4 + 2) << 16 | s.charCodeAt(i * 4 + 3) << 24;
        }
        if (w) l[l.length] = s.length;
        return l;
    },
    long2str: function(l, w) {
        var a = new Array(l.length);
        for (var i = 0; i < l.length; i++) {
            a[i] = String.fromCharCode(l[i] & 0xFF, l[i] >>> 8 & 0xFF, l[i] >>> 16 & 0xFF, l[i] >>> 24 & 0xFF);
        }
        return w ? a.join('').substring(0, l[l.length - 1]) : a.join('');
    }
};

function b64Enc(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64Dec(str) { try { return decodeURIComponent(escape(atob(str))); } catch(e) { return ""; } }

// --- AUTO CRYPTO ACTIONS ---
function autoEncrypt() {
    var seed = document.getElementById('master-seed').value;
    var text = document.getElementById('msg-input').value;
    var ttl = parseInt(document.getElementById('ttl').value, 10);
    
    if(!text) { document.getElementById('crypto-io').value = ""; return; }

    var currentKey = getOTPKeyByWindow(seed, 0);
    var payload = new Date().getTime() + "|" + ttl + "|" + text;
    var encrypted = AESLight.encrypt(payload, currentKey);
    
    document.getElementById('crypto-io').value = b64Enc(encrypted);
}

function autoDecrypt() {
    var cryptoInput = document.getElementById('crypto-io').value;
    if(cryptoInput.length < 10) return;

    var seed = document.getElementById('master-seed').value;
    var ciphertext = b64Dec(cryptoInput);
    if(!ciphertext) return;

    var decrypted = "";
    var parts = [];
    var windowsToTry = [0, -1]; // Allow 30-second clock drift tolerance

    for (var i = 0; i < windowsToTry.length; i++) {
        var testKey = getOTPKeyByWindow(seed, windowsToTry[i]);
        decrypted = AESLight.decrypt(ciphertext, testKey);
        parts = decrypted.split("|");
        if (parts.length >= 3 && !isNaN(parts[0])) break;
    }

    if (parts.length < 3 || isNaN(parts[0])) return;

    var timestamp = parseInt(parts[0], 10);
    var ttlSeconds = parseInt(parts[1], 10);
    var text = parts.slice(2).join("|");

    var now = new Date().getTime();
    var timeLeft = ttlSeconds - Math.floor((now - timestamp) / 1000);

    if(timeLeft <= 0) {
        document.getElementById('crypto-io').value = "";
        return;
    }

    var sticky = document.getElementById('sticky-note');
    var noteText = document.getElementById('note-text');
    var countdown = document.getElementById('countdown');

    if (noteText.innerText === text && sticky.classList.contains('show')) return;

    noteText.innerText = text;
    sticky.classList.add('show');
    document.getElementById('msg-input').value = ""; 

    if(timerInterval) clearInterval(timerInterval);
    
    timerInterval = setInterval(function() {
        timeLeft--;
        if(timeLeft <= 0) {
            clearInterval(timerInterval);
            noteText.innerText = "";
            document.getElementById('crypto-io').value = "";
            sticky.classList.remove('show');
        } else {
            countdown.innerText = "Auto-destruction in " + timeLeft + " seconds.";
        }
    }, 1000);
}

function updateLiveKey() {
    if(document.getElementById('msg-input').value.length > 0) autoEncrypt();
}

// System startup
startLiveTimer();
</script>
</body>
</html>
