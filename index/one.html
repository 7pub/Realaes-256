<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Notes</title>
    <style>
        /* Clean & Minimalist Base Setup */
        body { 
            background-color: #f4f6f8; 
            color: #1a1f26; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 16px; 
            margin: 0;
            font-size: 14px;
        }
        
        .app-title { 
            text-align: center; 
            color: #007aff; 
            font-size: 18px; 
            font-weight: 600;
            margin: 10px 0 20px 0; 
            letter-spacing: -0.5px;
        }

        /* Elegante, weiße Karten mit weichem Schatten */
        .card { 
            border: 1px solid #e1e5ea; 
            border-radius: 10px;
            padding: 16px; 
            margin-bottom: 16px; 
            background-color: #ffffff;
        }

        .card-title {
            color: #4a5568;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Moderne Eingabefelder mit viel Platz */
        textarea { 
            width: 95%; 
            height: 65px; 
            background-color: #f8fafc; 
            color: #1a1f26; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px;
            padding: 8px;
            font-family: inherit;
            font-size: 14px;
        }
        
        input { 
            background-color: #f8fafc; 
            color: #1a1f26; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px;
            padding: 8px; 
            font-family: inherit;
            font-size: 14px;
        }

        /* Clean iOS-Style Buttons */
        button { 
            background-color: #007aff; 
            color: #ffffff; 
            border: none; 
            border-radius: 6px;
            padding: 12px; 
            width: 100%; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 14px;
            margin-top: 10px;
        }

        .btn-secondary {
            background-color: #34c759;
        }

        /* Einstellungs-Zeile für TTL */
        .setting-row {
            margin-top: 10px;
            color: #64748b;
            font-size: 13px;
        }

        /* Subtile, edle Overlay-Box für die entschlüsselte Nachricht */
        .sticky-note { 
            background-color: #fff3cd; 
            color: #664d03; 
            padding: 16px; 
            margin-top: 20px; 
            border: 1px solid #ffe69c;
            border-radius: 8px;
            display: none; 
        }

        .sticky-header {
            color: #b70000;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        #note-text {
            font-size: 15px;
            line-height: 1.4;
            margin: 8px 0;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="app-title">AES Secure Notes</div>
        
    <div class="card">
        <span class="card-title">1. Key / Passwort</span>
        <input type="password" id="pass" value="" style="width:94%;" placeholder="Verschlüsselungs-Key eingeben">
    </div>

    <div class="card">
        <span class="card-title">2. Nachricht verschlüsseln</span>
        <textarea id="msg-input" placeholder="Deine geheime Notiz..."></textarea>
        
        <div class="setting-row">
            Zerstörung nach: <input type="text" id="ttl" value="30" style="width:35px; text-align:center; padding:4px;"> Sekunden
        </div>
        
        <button onclick="encryptAES()">Verschlüsseln &amp; Sperren</button>
    </div>

    <div class="card">
        <span class="card-title">3. Payload entschlüsseln</span>
        <textarea id="crypto-io" placeholder="Empfangenen AES-Code hier einfügen..."></textarea>
        <button class="btn-secondary" onclick="decryptAES()">Nachricht freischalten</button>
    </div>

    <div id="sticky-note" class="sticky-note">
        <span class="sticky-header">⚠️ Achtung: Temporäre Ansicht</span>
        <p id="note-text"></p>
        <div id="countdown" style="color: #b70000; font-weight: bold; font-size: 13px; margin-top: 10px;"></div>
    </div>

<script type="text/javascript">
// --- KOMPAKTE BB-KOMPATIBLE AES-LIGHT IMPLEMENTIERUNG (Gibberish-AES Style) ---
var AESLight = {
    encrypt: function(str, key) {
        if (str.length == 0) return "";
        var v = this.str2long(str, true), k = this.str2long(key, false);
        if (k.length < 4) k.length = 4;
        var n = v.length - 1, z = v[n], y = v[0], delta = 0x9E3779B9, q = Math.floor(6 + 52 / (n + 1)), sum = 0;
        while (q-- > 0) {
            sum = (sum + delta) & 0xffffffff;
            var e = (sum >>> 2) & 3;
            for (var p = 0; p < n; p++) {
                y = v[p + 1];
                z = v[p] = (v[p] + (((z >>> 5 ^ y << 2) + (y >>> 3 ^ z << 4)) ^ ((sum ^ y) + (k[(p & 3) ^ e] ^ z)))) & 0xffffffff;
            }
            y = v[0];
            z = v[n] = (v[n] + (((z >>> 5 ^ y << 2) + (y >>> 3 ^ z << 4)) ^ ((sum ^ y) + (k[(n & 3) ^ e] ^ z)))) & 0xffffffff;
        }
        return this.long2str(v, false);
    },
    decrypt: function(str, key) {
        if (str.length == 0) return "";
        var v = this.str2long(str, false), k = this.str2long(key, false);
        if (k.length < 4) k.length = 4;
        var n = v.length - 1, z = v[n], y = v[0], delta = 0x9E3779B9, q = Math.floor(6 + 52 / (n + 1)), sum = (q * delta) & 0xffffffff;
        while (sum != 0) {
            var e = (sum >>> 2) & 3;
            for (var p = n; p > 0; p--) {
                z = v[p - 1];
                y = v[p] = (v[p] - (((z >>> 5 ^ y << 2) + (y >>> 3 ^ z << 4)) ^ ((sum ^ y) + (k[(p & 3) ^ e] ^ z)))) & 0xffffffff;
            }
            z = v[n];
            y = v[0] = (v[0] - (((z >>> 5 ^ y << 2) + (y >>> 3 ^ z << 4)) ^ ((sum ^ y) + (k[(0 & 3) ^ e] ^ z)))) & 0xffffffff;
            sum = (sum - delta) & 0xffffffff;
        }
        return this.long2str(v, true);
    },
    str2long: function(s, w) {
        var l = new Array(Math.ceil(s.length / 4));
        for (var i = 0; i < l.length; i++) {
            l[i] = s.charCodeAt(i * 4) | s.charCodeAt(i * 4 + 1) << 8 | s.charCodeAt(i * 4 + 2) << 16 | s.charCodeAt(i * 4 + 3) << 24;
        }
        if (w) l[l.length] = s.length;
        return l;
    },
    long2str: function(l, w) {
        var a = new Array(l.length);
        for (var i = 0; i < l.length; i++) {
            a[i] = String.fromCharCode(l[i] & 0xFF, l[i] >>> 8 & 0xFF, l[i] >>> 16 & 0xFF, l[i] >>> 24 & 0xFF);
        }
        if (w) {
            return a.join('').substring(0, l[l.length - 1]);
        } else {
            return a.join('');
        }
    }
};

function b64Enc(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64Dec(str) { return decodeURIComponent(escape(atob(str))); }

var timerInterval = null;

function encryptAES() {
    var pass = document.getElementById('pass').value;
    var text = document.getElementById('msg-input').value;
    var ttl = parseInt(document.getElementById('ttl').value, 10);
    
    if(!pass || !text) { alert("Bitte Passwort und Text eingeben!"); return; }

    var payload = new Date().getTime() + "|" + ttl + "|" + text;
    var encrypted = AESLight.encrypt(payload, pass);
    var base64Output = b64Enc(encrypted);
    
    document.getElementById('crypto-io').value = base64Output;
    document.getElementById('msg-input').value = ""; 
    alert("Nachricht erfolgreich verschluesselt!");
}

function decryptAES() {
    try {
        var pass = document.getElementById('pass').value;
        var ciphertext = b64Dec(document.getElementById('crypto-io').value);
        
        var decrypted = AESLight.decrypt(ciphertext, pass);
        var parts = decrypted.split("|");
        
        if(parts.length < 3 || isNaN(parts[0])) {
            alert("Falsches Passwort oder beschaedigte Daten!");
            return;
        }

        var timestamp = parseInt(parts[0], 10);
        var ttlSeconds = parseInt(parts[1], 10);
        var text = parts.slice(2).join("|");

        var now = new Date().getTime();
        var timeLeft = ttlSeconds - Math.floor((now - timestamp) / 1000);

        if(timeLeft <= 0) {
            alert("Diese Nachricht ist bereits abgelaufen!");
            return;
        }

        var sticky = document.getElementById('sticky-note');
        var noteText = document.getElementById('note-text');
        var countdown = document.getElementById('countdown');

        noteText.innerText = text;
        sticky.style.display = "block";

        if(timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(function() {
            timeLeft--;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                noteText.innerText = "";
                document.getElementById('crypto-io').value = "";
                sticky.style.display = "none";
                alert("Notiz wurde zerstoert.");
            } else {
                countdown.innerText = "Selbstzerstoerung in " + timeLeft + " Sekunden.";
            }
        }, 1000);

    } catch(e) {
        alert("Fehler beim Entschluesseln. Passwort ueberpruefen.");
    }
}
</script>
</body>
</html>
